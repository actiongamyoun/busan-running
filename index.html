<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
body{font-family:'Noto Sans KR',sans-serif;background:#f8faf8;min-height:100vh;color:#1a1a1a}
input,textarea,select{-webkit-user-select:text;user-select:text;font-family:inherit;outline:none}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
:root{--g1:#059669;--g2:#0ea5e9;--card:#fff;--sub:#6b7280;--dim:#9ca3af}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .6s ease both}
.scale-in{animation:scaleIn .4s ease both}

/* 대문 */
.splash{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:40px 24px 60px;background:#000;overflow:hidden;cursor:pointer}
.splash-bg{position:absolute;inset:0;background:#000}
.splash-ill{position:absolute;inset:0;background:url('https://raw.githubusercontent.com/actiongamyoun/busan-running/main/splash.png') center center/cover no-repeat;opacity:.45}
.splash *{position:relative;z-index:1}
.splash h1{font-size:44px;font-weight:900;color:#fff;letter-spacing:-2px;text-align:center;line-height:1.1}
.splash p{font-size:15px;color:rgba(255,255,255,.7);margin:10px 0 0;text-align:center}
.splash-hint{margin-top:32px;font-size:13px;color:rgba(255,255,255,.35);animation:fadeIn 1.5s ease 1s both}
.splash-users{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border-radius:20px;padding:5px 14px;font-size:12px;color:rgba(255,255,255,.8);font-weight:600;z-index:2}

/* 닉네임 팝업 */
.nick-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.nick-popup{background:#fff;border-radius:24px 24px 0 0;padding:32px 24px 40px;width:100%;max-width:400px;animation:slideUp .3s ease both}
.nick-err{color:#ef4444;font-size:12px;font-weight:600;margin-top:6px;text-align:center;min-height:18px}

/* 탭바 */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-top:1px solid #f0f0f0;display:flex;z-index:100;padding:4px 0 env(safe-area-inset-bottom,6px)}
.tab-bar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 0;background:none;font-size:9px;font-weight:600;color:var(--dim);transition:color .2s}
.tab-bar button.on{color:var(--g1)}
.tab-bar button .ti{font-size:22px}

/* 신호등 */
.signal{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.sig-green{background:#22c55e}
.sig-yellow{background:#eab308}
.sig-red{background:#ef4444}

/* 그리드 카드 */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px}
.sq{position:relative;border-radius:16px;overflow:hidden;background:var(--card);box-shadow:0 2px 12px rgba(0,0,0,.06);cursor:pointer;transition:transform .2s;aspect-ratio:1}
.sq:active{transform:scale(.97)}
.sq-top{height:50%;display:flex;align-items:center;justify-content:center;font-size:44px}
.sq-bot{padding:8px 10px;height:50%}
.sq-name{font-size:13px;font-weight:800;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sq-info{font-size:10px;color:var(--sub);margin-top:2px}
.sq-stats{display:flex;gap:8px;font-size:10px;color:var(--dim);margin-top:auto;padding-top:4px}
.sq-sig{position:absolute;top:8px;right:8px}

/* 상세/카드/입력 */
.detail-hero{padding:20px 16px 28px;color:#fff;position:relative;overflow:hidden;border-radius:0 0 28px 28px}
.inp{width:100%;padding:10px 12px;border-radius:12px;border:1.5px solid #e5e7eb;font-size:14px;margin-top:4px;background:#fff}
.inp:focus{border-color:var(--g1)}
.lbl{font-size:11px;font-weight:600;color:var(--sub);display:block;margin-bottom:2px}
.card{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:10px}
.chip{padding:4px 10px;border-radius:16px;font-size:11px;font-weight:600;background:#f3f4f6;color:#4b5563;transition:all .15s}
.chip.on{background:var(--g1);color:#fff}
.gps-panel{position:fixed;bottom:66px;left:10px;right:10px;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-radius:20px;padding:16px;box-shadow:0 8px 30px rgba(0,0,0,.12);z-index:90}
.gps-stat{text-align:center;flex:1}
.gps-stat .val{font-size:26px;font-weight:900;color:var(--g1)}
.gps-stat .lbl{font-size:9px;color:var(--sub);margin-top:2px}
/* 접속자 배너 */
.online-bar{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:11px;color:var(--sub);font-weight:600}
.online-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>

  const a=$('app');
  if(S.showSplash){a.innerHTML=rSplash()+(S.showNickPopup?rNickPopup():'');bSplash();return}
  if(!S.nickname){S.showSplash=true;S.showNickPopup=true;render();return}
  let h='';
  if(S.modal==='detail'&&S.selectedCourse)h=rDetail();
  else if(S.modal==='writeRec')h=rWriteRec();
  else if(S.modal==='createGroup')h=rCreateGroup();
  else if(S.tab==='rec')h=rRecTab();
  else if(S.tab==='run')h=rRunTab();
  else if(S.tab==='group')h=rGroupTab();
  else if(S.tab==='my')h=rMyTab();
  else h=rHome();
  h+=rTabBar();a.innerHTML=h;bind();
  if(S.modal==='detail')initDetailMap();
  if(S.modal==='writeRec')initRecFormMap();
}

function rNickPopup(){return`
<div class="nick-overlay" id="nickOverlay">
  <div class="nick-popup">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:40px;margin-bottom:6px">🏃</div>

    </div>

  </div>
</div>`}

function bSplash(){
  const sa=$('splashArea');if(sa)sa.onclick=()=>{if(S.nickname){S.showSplash=false;render();ensureProfile().then(()=>loadFromServer())}else if(!S.showNickPopup){S.showNickPopup=true;render()}};
  const lb=$('langB');if(lb)lb.onclick=(e)=>{e.stopPropagation();S.lang=S.lang==='ko'?'en':'ko';render()};
  const go=async()=>{
    const v=$('nickIn')?.value.trim();
    if(!v)return;
    // 닉네임 중복 체크
    const errEl=$('nickErr');if(errEl)errEl.textContent=t('nickChecking');
    const goBtn=$('nickGo');if(goBtn)goBtn.disabled=true;
    const existing=await api('getProfile',{nickname:v});
    if(existing&&Array.isArray(existing)&&existing.length>0){
      S.nickError=t('nickDup');if(errEl)errEl.textContent=t('nickDup');if(goBtn)goBtn.disabled=false;return;
    }
    S.nickError='';S.nickname=v;sl('nick',v);S.showSplash=false;S.showNickPopup=false;render();
    await ensureProfile();await loadFromServer();
  };
  const gb=$('nickGo');if(gb)gb.onclick=go;
  const ni=$('nickIn');if(ni){ni.onclick=e=>e.stopPropagation();ni.oninput=()=>{S.nickError='';const err=$('nickErr');if(err)err.textContent=''};ni.onkeydown=e=>{if(e.key==='Enter')go()}}
  const ov=$('nickOverlay');if(ov)ov.onclick=e=>{if(e.target===ov){S.showNickPopup=false;S.nickError='';render()}}
}

let recSelectedTags=[];
function bind(){
  document.querySelectorAll('[data-tab]').forEach(el=>el.onclick=()=>{S.tab=el.dataset.tab;S.modal=null;S.selectedCourse=null;S.showAllCmt=false;render()});
  const lt=$('langT');if(lt)lt.onclick=()=>{S.lang=S.lang==='ko'?'en':'ko';render()};
  document.querySelectorAll('[data-action="toggleSig"]').forEach(el=>el.onclick=()=>{S.noSigFilter=!S.noSigFilter;render()});
  document.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>{const[ty,id]=el.dataset.open.split(':');S.selectedType=ty;S.selectedCourse=ty==='official'?S.courses.find(c=>c.id===id):S.recCourses.find(c=>c.id===id);S.modal='detail';S.showAllCmt=false;render()});
  document.querySelectorAll('[data-action="back"],[data-action="closeModal"]').forEach(el=>el.onclick=()=>{S.modal=null;S.selectedCourse=null;render()});
  document.querySelectorAll('[data-action="like"]').forEach(el=>el.onclick=()=>{if(!S.selectedCourse)return;const id=S.selectedCourse.id,k=id+':'+S.userId;if(S.selectedType==='official'){if(S.likes[k])delete S.likes[k];else S.likes[k]=true;sl('likes',S.likes);render();api('toggleLike',{course_id:id,user_id:S.userId})}else{if(S.recLikes[k])delete S.recLikes[k];else S.recLikes[k]=true;sl('rlikes',S.recLikes);render();api('toggleRecLike',{rec_course_id:id,user_id:S.userId})}});
  document.querySelectorAll('[data-rate]').forEach(el=>el.onclick=()=>{if(!S.selectedCourse)return;S.ratings[S.selectedCourse.id+':'+S.userId]=+el.dataset.rate;sl('ratings',S.ratings);render();api('upsertRating',{course_id:S.selectedCourse.id,user_id:S.userId,score:+el.dataset.rate})});
  document.querySelectorAll('[data-action="comment"]').forEach(el=>el.onclick=()=>{const inp=$('cmtIn');if(!inp||!inp.value.trim()||!S.selectedCourse)return;const id=S.selectedCourse.id,txt=inp.value.trim(),cm={id:uid(),user:S.nickname,text:txt,ts:Date.now()};if(S.selectedType==='official'){if(!S.comments[id])S.comments[id]=[];S.comments[id].push(cm);sl('comments',S.comments);render();api('addComment',{course_id:id,user_id:S.userId,nickname:S.nickname,body:txt})}else{if(!S.recComments[id])S.recComments[id]=[];S.recComments[id].push(cm);sl('rcomments',S.recComments);render();api('addRecComment',{rec_course_id:id,user_id:S.userId,nickname:S.nickname,body:txt})}});
  document.querySelectorAll('[data-action="showAll"]').forEach(el=>el.onclick=()=>{S.showAllCmt=true;render()});
  document.querySelectorAll('[data-action="openWriteRec"]').forEach(el=>el.onclick=()=>{S.modal='writeRec';recSelectedTags=[];render()});
  document.querySelectorAll('[data-rectag]').forEach(el=>{const tg=el.dataset.rectag;if(recSelectedTags.includes(tg))el.classList.add('on');el.onclick=()=>{if(recSelectedTags.includes(tg))recSelectedTags=recSelectedTags.filter(x=>x!==tg);else recSelectedTags.push(tg);el.classList.toggle('on')}});
  document.querySelectorAll('[data-action="submitRec"]').forEach(el=>el.onclick=submitRec);
  document.querySelectorAll('[data-action="startRun"]').forEach(el=>el.onclick=startGps);
  document.querySelectorAll('[data-action="pauseRun"]').forEach(el=>el.onclick=()=>{S.gpsState='paused';render()});
  document.querySelectorAll('[data-action="resumeRun"]').forEach(el=>el.onclick=()=>{S.gpsState='running';render()});
  document.querySelectorAll('[data-action="stopRun"]').forEach(el=>el.onclick=stopGps);
  document.querySelectorAll('[data-action="openCG"]').forEach(el=>el.onclick=()=>{S.modal='createGroup';render()});
  document.querySelectorAll('[data-action="submitGr"]').forEach(el=>el.onclick=submitGroup);
  document.querySelectorAll('[data-ga]').forEach(el=>el.onclick=()=>{const[act,gid]=el.dataset.ga.split(':');const g=S.groupRuns.find(x=>x.id===gid);if(!g)return;if(!g.members)g.members=[];if(act==='join'){if(!g.members.find(m=>m.nickname===S.nickname)){g.members.push({nickname:S.nickname});api('joinGroupRun',{group_run_id:gid,user_id:S.userId,nickname:S.nickname})}}else{g.members=g.members.filter(m=>m.nickname!==S.nickname);api('leaveGroupRun',{group_run_id:gid,user_id:S.userId})}sl('groups',S.groupRuns);render()});
}

async function submitRec(){
  const name=$('rf_name')?.value.trim(),desc=$('rf_desc')?.value.trim(),dist=parseFloat($('rf_dist')?.value)||0,diff=$('rf_diff')?.value||'easy';
  if(!name||!desc||!dist){alert(S.lang==='ko'?'이름, 설명, 거리를 입력하세요':'Fill required fields');return}
  const tags=recSelectedTags.length?recSelectedTags:['scenic'];
  const sd={id:'r_'+uid(),name,description:desc,area:S.lang==='ko'?'추천코스':'Pick',distance:dist,difficulty:diff,tags,no_signal:tags.includes('no_signal'),emoji:'📍',color:'#059669',lat:S.recFormLat,lng:S.recFormLng,route_coords:[{lat:S.recFormLat,lng:S.recFormLng}],author_id:S.userId,author_nickname:S.nickname};
  S.recCourses.push({...sd,name_ko:name,name_en:name,area_ko:'추천코스',area_en:'Pick',desc,description_ko:desc,description_en:desc,surface:'',surface_ko:'',surface_en:'',author:S.nickname,ts:Date.now()});
  sl('recs',S.recCourses);S.modal=null;S.tab='rec';render();api('createRecCourse',sd);
}
async function submitGroup(){
  const cid=$('grC')?.value,title=$('grT')?.value,date=$('grD')?.value,max=+($('grM')?.value||10),pace=$('grP')?.value;
  if(!cid||!date){alert(S.lang==='ko'?'코스와 날짜를 입력하세요':'Select course and date');return}
  const c=[...S.courses,...S.recCourses].find(x=>x.id===cid);
  S.groupRuns.push({id:uid(),course_id:cid,title:title||cn(c),run_date:date,max_members:max,pace,host_nickname:S.nickname,members:[{nickname:S.nickname}]});
  sl('groups',S.groupRuns);S.modal=null;render();
  const res=await api('createGroupRun',{course_id:cid,title:title||cn(c),description_ko:'',run_date:date,max_members:max,pace,host_id:S.userId,host_nickname:S.nickname});
  if(res&&Array.isArray(res)&&res[0])api('joinGroupRun',{group_run_id:res[0].id,user_id:S.userId,nickname:S.nickname});
}

function startGps(){
  const sel=$('runSel');if(!sel||!sel.value){alert(t('selCourse'));return}
  S.selectedCourse=[...S.courses,...S.recCourses].find(c=>c.id===sel.value);
  if(!navigator.geolocation){alert('GPS not supported');return}
  S.gpsState='waiting';S.gpsCoords=[];S.gpsDist=0;S.gpsElapsed=0;
  S.gpsWatch=navigator.geolocation.watchPosition(p=>{const pt={lat:p.coords.latitude,lng:p.coords.longitude,ts:Date.now()};if(S.gpsState==='waiting')S.gpsState='running';if(S.gpsState==='running'){if(S.gpsCoords.length)S.gpsDist+=calcDist(S.gpsCoords[S.gpsCoords.length-1],pt);S.gpsCoords.push(pt)}render()},e=>console.error(e),{enableHighAccuracy:true,maximumAge:3000,timeout:10000});
  S.gpsTimer=setInterval(()=>{if(S.gpsState==='running'){S.gpsElapsed++;render()}},1000);render();
}
function stopGps(){
  if(S.gpsWatch)navigator.geolocation.clearWatch(S.gpsWatch);if(S.gpsTimer)clearInterval(S.gpsTimer);
  const r={course_id:S.selectedCourse?.id||'',distance:+(S.gpsDist/1000).toFixed(3),duration:S.gpsElapsed,avg_pace:fmtPace(S.gpsDist/1000,S.gpsElapsed),route:S.gpsCoords,ts:Date.now(),user_id:S.userId};
  S.myRecords.unshift(r);sl('records',S.myRecords);S.gpsState='idle';S.gpsWatch=null;S.gpsTimer=null;S.tab='my';render();
  api('saveRunRecord',{user_id:S.userId,course_id:r.course_id,distance:r.distance,duration:r.duration,avg_pace:r.avg_pace,route:r.route});
}

function hasKakao(){return typeof kakao!=='undefined'&&kakao.maps}
function mapPH(el){if(el)el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:11px">🗺️ 카카오맵 API 설정 필요</div>'}
function initDetailMap(){const el=$('detailMap');if(!el)return;const c=S.selectedCourse;if(!c||!hasKakao()){mapPH(el);return}const map=new kakao.maps.Map(el,{center:new kakao.maps.LatLng(c.lat,c.lng),level:5});new kakao.maps.Marker({map,position:new kakao.maps.LatLng(c.lat,c.lng)});if(c.route_coords?.length>1)new kakao.maps.Polyline({map,path:c.route_coords.map(p=>new kakao.maps.LatLng(p.lat,p.lng)),strokeWeight:4,strokeColor:c.color||'#059669',strokeOpacity:.8,strokeStyle:'solid'})}
function initRecFormMap(){const el=$('recFormMap');if(!el)return;if(!hasKakao()){mapPH(el);return}const map=new kakao.maps.Map(el,{center:new kakao.maps.LatLng(S.recFormLat,S.recFormLng),level:7});let mk=new kakao.maps.Marker({map,position:new kakao.maps.LatLng(S.recFormLat,S.recFormLng),draggable:true});kakao.maps.event.addListener(map,'click',e=>{S.recFormLat=e.latLng.getLat();S.recFormLng=e.latLng.getLng();mk.setPosition(e.latLng)})}

// === Supabase 연동 ===
async function loadFromServer(){
  try{
    const c=await api('getCourses');if(c?.length)S.courses=c;
    const lk=await api('getLikes');if(Array.isArray(lk)){S.likes={};lk.forEach(l=>{S.likes[l.course_id+':'+l.user_id]=true})}
    const rt=await api('getRatings');if(Array.isArray(rt)){S.ratings={};rt.forEach(r=>{S.ratings[r.course_id+':'+r.user_id]=r.score})}
    const cm=await api('getComments');if(Array.isArray(cm)){S.comments={};cm.forEach(c=>{if(!S.comments[c.course_id])S.comments[c.course_id]=[];S.comments[c.course_id].push({id:c.id,user:c.nickname,text:c.body,ts:new Date(c.created_at).getTime()})})}
    const rc=await api('getRecCourses');if(Array.isArray(rc)){S.recCourses=rc.map(r=>({id:r.id,name:r.name,name_ko:r.name,name_en:r.name,area:r.area||'추천',area_ko:r.area||'추천',area_en:r.area||'Pick',desc:r.description,description_ko:r.description,description_en:r.description,distance:r.distance||0,elevation:r.elevation||0,difficulty:r.difficulty||'easy',surface:r.surface||'',surface_ko:r.surface||'',surface_en:r.surface||'',tags:r.tags||[],no_signal:(r.tags||[]).includes('no_signal'),emoji:r.emoji||'📍',color:r.color||'#059669',lat:r.lat||35.15,lng:r.lng||129.06,route_coords:r.route_coords||[],author:r.author_nickname||'',ts:new Date(r.created_at).getTime()}))}
    const rl=await api('getRecLikes');if(Array.isArray(rl)){S.recLikes={};rl.forEach(l=>{S.recLikes[l.rec_course_id+':'+l.user_id]=true})}
    const rcm=await api('getRecComments');if(Array.isArray(rcm)){S.recComments={};rcm.forEach(c=>{if(!S.recComments[c.rec_course_id])S.recComments[c.rec_course_id]=[];S.recComments[c.rec_course_id].push({id:c.id,user:c.nickname,text:c.body,ts:new Date(c.created_at).getTime()})})}
    const gr=await api('getGroupRuns');if(Array.isArray(gr))S.groupRuns=gr.map(g=>({...g,members:g.group_run_members||[]}));
    if(S.userId){const mr=await api('getMyRecords',{user_id:S.userId});if(Array.isArray(mr))S.myRecords=mr}
    // 총 러너 수 가져오기
    const allProfiles=await api('getAllProfiles');if(Array.isArray(allProfiles))S.totalUsers=allProfiles.length;
    sl('likes',S.likes);sl('ratings',S.ratings);sl('comments',S.comments);sl('recs',S.recCourses);sl('rlikes',S.recLikes);sl('rcomments',S.recComments);sl('groups',S.groupRuns);sl('records',S.myRecords);
  }catch(e){console.log('Offline:',e)}
  render();
}
async function ensureProfile(){
  if(!S.nickname)return;
  let p=await api('getProfile',{nickname:S.nickname});
  if(p?.length)S.userId=p[0].id;
  else{const c=await api('createProfile',{nickname:S.nickname,lang:S.lang});if(c?.length)S.userId=c[0].id}
  sl('userId',S.userId);
}
function init(){
  S.nickname=gl('nick','');S.userId=gl('userId',null);S.courses=FC;
  S.likes=gl('likes',{});S.ratings=gl('ratings',{});S.comments=gl('comments',{});
  S.recCourses=gl('recs',[]);S.recLikes=gl('rlikes',{});S.recComments=gl('rcomments',{});
  S.groupRuns=gl('groups',[]);S.myRecords=gl('records',[]);
  S.showSplash=true;
  render();
  // 대문에서 러너 수 표시
  api('getAllProfiles').then(d=>{if(Array.isArray(d)){S.totalUsers=d.length;render()}}).catch(()=>{});
  if(S.nickname)ensureProfile().then(()=>loadFromServer());
}
init();
</script>
