<title>부산 러닝 | Busan Running</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
body{font-family:'Noto Sans KR',sans-serif;background:#f0fdf4;min-height:100vh;color:#111827}
input,textarea,select{-webkit-user-select:text;user-select:text;font-family:inherit;outline:none}
:root{--g1:#059669;--g2:#0ea5e9;--card:#fff;--txt:#374151;--sub:#6b7280;--dim:#9ca3af}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
.hide{display:none!important}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.fade-up{animation:fadeUp .4s ease both}
.card{background:var(--card);border-radius:20px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,.06);margin-bottom:14px;transition:all .25s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(5,150,105,.12)}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e7eb;display:flex;z-index:100;padding:6px 0 env(safe-area-inset-bottom,8px)}
.tab-bar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;background:none;font-size:10px;font-weight:700;color:var(--dim);transition:color .2s}
.tab-bar button.active{color:var(--g1)}
.tab-bar button img{width:28px;height:28px;object-fit:contain;transition:opacity .2s,transform .15s}
.tab-bar button.active img{transform:scale(1.1)}
.tab-bar button:not(.active) img{opacity:.4;filter:grayscale(100%)}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;transition:all .15s;background:#f3f4f6;color:#4b5563}
.chip.on{background:var(--g1);color:#fff}
.toggle-track{width:44px;height:26px;border-radius:13px;position:relative;transition:background .2s;cursor:pointer}
.toggle-thumb{width:22px;height:22px;border-radius:11px;background:#fff;position:absolute;top:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.gps-panel{position:fixed;bottom:70px;left:12px;right:12px;background:#fff;border-radius:20px;padding:16px;box-shadow:0 8px 30px rgba(0,0,0,.15);z-index:90}
.gps-stat{text-align:center;flex:1}
.gps-stat .val{font-size:24px;font-weight:800;color:var(--g1)}
.gps-stat .lbl{font-size:10px;color:var(--sub);margin-top:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-content{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.badge-green{background:#dcfce7;color:#059669}
.inp{width:100%;padding:10px 12px;border-radius:12px;border:2px solid #e5e7eb;font-size:14px;margin-top:4px}
.inp:focus{border-color:var(--g1)}
.lbl{font-size:12px;font-weight:600;color:var(--sub);display:block;margin-bottom:2px}

/* ===== 새 코스 카드 디자인 ===== */
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.course-card{
  position:relative;border-radius:20px;overflow:hidden;margin-bottom:14px;cursor:pointer;
  background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.07);
  animation:cardIn .4s cubic-bezier(.22,1,.36,1) both;
  transition:transform .2s cubic-bezier(.22,1,.36,1),box-shadow .2s;
  -webkit-tap-highlight-color:transparent;
}
.course-card:active{transform:scale(.975);box-shadow:0 1px 6px rgba(0,0,0,.1)}
.course-card-hero{position:relative;height:110px;overflow:hidden;flex-shrink:0}
.course-card-hero-bg{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:72px;filter:blur(0px);transform:scale(1.1);
  transition:transform .3s;
}
.course-card-hero-overlay{position:absolute;inset:0;background:linear-gradient(160deg,transparent 30%,rgba(0,0,0,.55))}
.course-card-hero-badges{position:absolute;top:10px;left:10px;display:flex;gap:6px;flex-wrap:wrap}
.course-card-hero-stats{position:absolute;bottom:10px;right:10px;display:flex;gap:8px;align-items:center}
.hero-stat{
  background:rgba(255,255,255,.2);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:3px 8px;
  font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;gap:3px;
}
.nsig-pill{
  background:rgba(255,255,255,.95);border-radius:20px;padding:3px 9px;
  font-size:10px;font-weight:800;color:#059669;display:flex;align-items:center;gap:3px;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.diff-pill{
  border-radius:20px;padding:3px 9px;font-size:10px;font-weight:800;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.course-card-body{padding:12px 14px 10px}
.course-card-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.course-card-name{font-size:15px;font-weight:800;color:#111827;letter-spacing:-.3px;line-height:1.3}
.course-card-area{font-size:11px;color:var(--sub);font-weight:600;margin-top:1px}
.course-card-emoji-icon{
  width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.course-card-desc{font-size:12px;color:#6b7280;margin-top:6px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.course-card-tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.course-card-tag{padding:2px 7px;border-radius:6px;font-size:10px;font-weight:600;color:var(--sub);background:#f3f4f6}
.course-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid #f3f4f6}
.course-card-reactions{display:flex;align-items:center;gap:10px}
.reaction-item{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--sub);font-weight:600}
.course-card-minimap{height:90px;border-radius:12px;background:linear-gradient(135deg,#e5e7eb,#f3f4f6);margin-top:10px;overflow:hidden;position:relative}
.map-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#9ca3af;font-weight:600}
.course-card-dist-badge{
  font-size:13px;font-weight:900;color:#111827;
  display:flex;align-items:baseline;gap:2px;
}
.course-card-dist-badge span{font-size:10px;font-weight:600;color:var(--sub)}
</style>

// === 렌더 ===
function render(){
  const a=$('app');
  if(!S.nickname){a.innerHTML=rLogin();bLogin();return}
  let h='';
  if(S.modal==='detail'&&S.selectedCourse) h=rDetail();
  else if(S.modal==='writeRec') h=rWriteRec();
  else if(S.modal==='createGroup') h=rCreateGroup();
  else if(S.tab==='rec') h=rRecTab();
  else if(S.tab==='run') h=rRunTab();
  else if(S.tab==='group') h=rGroupTab();
  else if(S.tab==='my') h=rMyTab();
  else h=rHome();
  h+=rTabBar();
  a.innerHTML=h;
  bind();
  if(S.modal==='detail') initDetailMap();
  if(S.modal==='writeRec') initRecFormMap();
  if(S.tab==='rec'&&!S.modal) initRecListMaps();
}

<button id="startBtn" style="width:100%;margin-top:16px;padding:14px;border-radius:14px;background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;font-size:16px;font-weight:700">${t('start')}</button>
</div></div>`}
function bLogin(){
  const lb=$('langBtn');if(lb)lb.onclick=()=>{S.lang=S.lang==='ko'?'en':'ko';render()};
  const ni=$('nickIn'),sb=$('startBtn');
  const go=()=>{const v=ni?.value.trim();if(v){S.nickname=v;sl('nick',v);render()}};

  if(ni)ni.onkeydown=e=>{if(e.key==='Enter')go()};
}

// --- 공통 코스 카드 (공식/추천 공용) ---
function rCourseCard(c,type,i){
  const isOff=type==='official';
  const lk=isOff?gLk(c.id):rLk(c.id);
  const av=isOff?gAv(c.id):0;
  const cm=isOff?gCm(c.id):rCm(c.id);
  const color=c.color||'#059669';
  const emoji=c.emoji||'📍';
  const diffLabel=cdf(c);
  const visibleTags=(c.tags||[]).filter(tg=>tg!=='no_signal').slice(0,3);
  const delay=(i||0)*.06;
  const heroBg=`linear-gradient(135deg,${color}dd,${color}88)`;
  const diffBg={easy:'rgba(16,185,129,.3)',medium:'rgba(245,158,11,.3)',hard:'rgba(239,68,68,.3)'}[c.difficulty]||'rgba(0,0,0,.15)';
  const diffFg={easy:'#d1fae5',medium:'#fef3c7',hard:'#fee2e2'}[c.difficulty]||'#fff';
  return`
  <div data-open="${type}:${c.id}" class="course-card" style="animation-delay:${delay}s">
    <div class="course-card-hero" style="background:${heroBg}">
      <div class="course-card-hero-bg">${emoji}</div>
      <div class="course-card-hero-overlay"></div>
      <div class="course-card-hero-badges">
        ${c.no_signal?`<div class="nsig-pill">🚫 ${t('noSig')}</div>`:''}
        <div class="diff-pill" style="background:${diffBg};color:${diffFg};border:1px solid rgba(255,255,255,.2)">${diffLabel}</div>
        ${!isOff?`<div class="diff-pill" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.2)">👤 ${c.author||''}</div>`:''}
      </div>
      <div class="course-card-hero-stats">
        <div class="hero-stat">📍 ${ca(c)}</div>
        <div class="hero-stat">▲${c.elevation||0}m</div>
      </div>
    </div>
    <div class="course-card-body">
      <div class="course-card-title-row">
        <div style="flex:1;min-width:0">
          <div class="course-card-name">${cn(c)}</div>
          <div class="course-card-area">${cs(c)}</div>
        </div>
        <div class="course-card-dist-badge">${c.distance}<span>km</span></div>
      </div>
      <div class="course-card-desc">${cd(c)}</div>
      ${visibleTags.length?`<div class="course-card-tags">${visibleTags.map(tg=>`<span class="course-card-tag">#${tl(tg)}</span>`).join('')}</div>`:''}
      <div class="course-card-minimap" id="minimap_${type}_${c.id}">
        <div class="map-placeholder">🗺️ ${S.lang==='ko'?'지도 로딩 중...':'Loading map...'}</div>
      </div>
      <div class="course-card-footer">
        <div class="course-card-reactions">
          ${isOff&&av?`<div class="reaction-item"><span style="color:#f59e0b">⭐</span>${av.toFixed(1)} <span style="color:#d1d5db;font-weight:400">(${gRc(c.id)})</span></div>`:''}
          <div class="reaction-item"><span>❤️</span>${lk}</div>
          <div class="reaction-item"><span>💬</span>${cm.length}</div>
        </div>
        <div style="font-size:11px;font-weight:700;color:${color};background:${color}15;padding:4px 12px;border-radius:20px">${S.lang==='ko'?'자세히 →':'View →'}</div>
      </div>
    </div>
  </div>`}

  return`<div style="padding-bottom:80px">
  <div style="background:linear-gradient(135deg,var(--g1),var(--g2));padding:28px 20px 24px;border-radius:0 0 32px 32px;color:#fff;position:relative;overflow:hidden">

      <div style="display:flex;gap:6px"><button id="langT" style="background:rgba(255,255,255,.2);border-radius:10px;padding:4px 10px;font-size:11px;font-weight:600;color:#fff">${t('langSw')}</button><div style="background:rgba(255,255,255,.2);border-radius:10px;padding:4px 10px;font-size:11px;font-weight:600">${S.nickname}</div></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">${[{n:S.courses.length,l:t('total')},{n:S.courses.filter(c=>c.no_signal).length,l:t('noSig')},{n:fc.length,l:t('result')}].map(s=>`<div style="flex:1;background:rgba(255,255,255,.15);border-radius:14px;padding:10px 8px;text-align:center"><div style="font-size:20px;font-weight:800">${s.n}</div><div style="font-size:10px;opacity:.85;margin-top:2px">${s.l}</div></div>`).join('')}</div>
  </div>
  <div style="padding:16px 16px 0">
    <div data-action="toggleSig" style="background:${S.filters.signal==='noSignal'?'linear-gradient(135deg,#dcfce7,#d1fae5)':'#fff'};border-radius:16px;padding:12px 16px;margin-bottom:10px;border:2px solid ${S.filters.signal==='noSignal'?'var(--g1)':'#e5e7eb'};display:flex;align-items:center;justify-content:space-between;cursor:pointer">
      <div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">🚫</span><div><div style="font-weight:700;font-size:13px;color:#064e3b">${t('noSigOnly')}</div><div style="font-size:10px;color:var(--sub);margin-top:1px">${t('noSigDesc')}</div></div></div>
      <div class="toggle-track" style="background:${S.filters.signal==='noSignal'?'var(--g1)':'#d1d5db'}"><div class="toggle-thumb" style="left:${S.filters.signal==='noSignal'?'20px':'2px'}"></div></div>
    </div>
    ${rFR(t('diff'),'difficulty',[['all',t('all')],['easy','🟢 '+t('easy')],['medium','🟡 '+t('med')],['hard','🔴 '+t('hard')]])}
    ${rFR(t('dist'),'distance',[['all',t('all')],['short',t('short')],['mid',t('mid')],['long',t('long')]])}
    ${rFR(t('vibe'),'vibe',[['all',t('all')],['scenic','🏞️'+t('scenic')],['quiet','🤫'+t('quiet')],['beach','🏖️'+t('beach')],['trail','🥾'+t('trail')],['urban','🏙️'+t('urban')],['night','🌃'+t('night')]])}
    <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap"><span style="font-size:11px;color:var(--sub);font-weight:600;line-height:28px">${t('sort')}:</span>${['rec','byRate','byLike','byDist'].map(k=>`<button data-sort="${k}" class="chip ${S.sortBy===k?'on':''}" style="${S.sortBy===k?'background:#064e3b;color:#fff':''}">${t(k)}</button>`).join('')}</div>
  </div>
  <div style="padding:14px 16px 0">${fc.length===0?`<div style="text-align:center;padding:48px 0;color:var(--dim)"><div style="font-size:48px;margin-bottom:12px">🔍</div><div style="font-weight:600">${t('noResult')}</div><div style="font-size:13px;margin-top:4px">${t('adjust')}</div></div>`:fc.map((c,i)=>rCourseCard(c,'official',i)).join('')}</div>
</div>`}
function rFR(label,key,opts){return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap"><span style="font-size:11px;color:var(--sub);font-weight:700;min-width:36px">${label}</span>${opts.map(([k,l])=>`<button data-filter="${key}:${k}" class="chip ${S.filters[key]===k?'on':''}">${l}</button>`).join('')}</div>`}
function getFiltered(){
  return S.courses.filter(c=>{
    if(S.filters.signal==='noSignal'&&!c.no_signal)return false;
    if(S.filters.difficulty!=='all'&&c.difficulty!==S.filters.difficulty)return false;
    const d=S.filters.distance;
    if(d==='short'&&c.distance>5)return false;if(d==='mid'&&(c.distance<=5||c.distance>10))return false;if(d==='long'&&c.distance<=10)return false;
    if(S.filters.vibe!=='all'&&!(c.tags||[]).includes(S.filters.vibe))return false;
    return true;
  }).sort((a,b)=>{
    if(S.sortBy==='byRate')return gAv(b.id)-gAv(a.id);
    if(S.sortBy==='byLike')return gLk(b.id)-gLk(a.id);
    if(S.sortBy==='byDist')return a.distance-b.distance;
    return((b.no_signal?100:0)+gAv(b.id)*10+gLk(b.id))-((a.no_signal?100:0)+gAv(a.id)*10+gLk(a.id));
  });
}

// --- 코스 상세 (공식/추천 공용) ---
function rDetail(){
  const c=S.selectedCourse,isOff=S.selectedType==='official';
  const lk=isOff?gLk(c.id):rLk(c.id);
  const il=isOff?iLk(c.id):riLk(c.id);
  const cm=isOff?gCm(c.id):rCm(c.id);

  const color=c.color||'#059669';
  return`<div style="padding-bottom:80px">
  <div style="background:linear-gradient(135deg,${color},${color}bb);padding:20px 20px 32px;border-radius:0 0 36px 36px;color:#fff;position:relative;overflow:hidden">
    <div style="position:absolute;bottom:-30px;right:-10px;font-size:140px;opacity:.1">${c.emoji||'📍'}</div>
    <button data-action="back" style="background:rgba(255,255,255,.2);color:#fff;border-radius:12px;padding:8px 16px;font-size:13px;font-weight:700;margin-bottom:14px">${t('back')}</button>
    <div style="position:relative;z-index:1">
      <div style="font-size:44px;margin-bottom:6px">${c.emoji||'📍'}</div>
      <h1 style="font-size:24px;font-weight:900;letter-spacing:-1px">${cn(c)}</h1>
      <p style="font-size:13px;opacity:.9;margin-top:6px">${ca(c)} · ${c.distance}km</p>
      ${c.no_signal?`<div style="display:inline-block;margin-top:8px;background:rgba(255,255,255,.25);padding:4px 12px;border-radius:16px;font-size:12px;font-weight:700">${t('noSigBadge')}</div>`:''}
      ${!isOff?`<div style="margin-top:6px;font-size:12px;opacity:.8">👤 ${c.author||''} · ${timeAgo(c.ts||Date.now())}</div>`:''}
    </div>
  </div>
  <div style="padding:16px">
    <div class="card fade-up"><div id="detailMap" style="width:100%;height:220px;border-radius:14px;background:#e5e7eb"></div></div>
    <div class="card fade-up" style="animation-delay:.1s">
      <p style="font-size:14px;color:var(--txt);line-height:1.7">${cd(c)}</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px">
        ${[{l:t('diffL'),v:cdf(c),cl:cdc(c)},{l:t('distL'),v:c.distance+'km',cl:'#0ea5e9'},{l:t('elevL'),v:'▲'+(c.elevation||0)+'m',cl:'#f59e0b'},{l:t('surfL'),v:cs(c),cl:'#8b5cf6'}].map(i=>`<div style="background:${i.cl}08;border-radius:12px;padding:10px 12px;border:1px solid ${i.cl}20"><div style="font-size:10px;color:var(--dim);font-weight:600">${i.l}</div><div style="font-size:14px;font-weight:700;color:${i.cl};margin-top:2px">${i.v}</div></div>`).join('')}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px">${(c.tags||[]).map(tg=>`<span style="background:#f3f4f6;padding:3px 9px;border-radius:8px;font-size:11px;font-weight:600;color:var(--sub)">#${tl(tg)}</span>`).join('')}</div>
    </div>
    <div class="card fade-up" style="animation-delay:.15s;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <button data-action="like" style="display:flex;align-items:center;gap:6px;padding:8px 18px;border-radius:14px;border:2px solid ${il?'#ef4444':'#e5e7eb'};background:${il?'#fef2f2':'#fff'};font-size:14px;font-weight:700;color:${il?'#ef4444':'var(--sub)'}">${il?'❤️':'🤍'} ${t('like')} ${lk}</button>
      ${isOff?`<div style="text-align:right"><div style="font-size:11px;color:var(--dim);font-weight:600;margin-bottom:3px">${t('rating')} ${gAv(c.id)?gAv(c.id).toFixed(1):'-'} (${gRc(c.id)}${t('ppl')})</div><div style="display:flex;gap:3px;justify-content:flex-end">${[1,2,3,4,5].map(s=>`<button data-rate="${s}" style="background:none;font-size:22px;padding:0;filter:${s<=gMr(c.id)?'none':'grayscale(1) opacity(.3)'}">⭐</button>`).join('')}</div></div>`:''}
    </div>
    <div class="card fade-up" style="animation-delay:.2s">
      <h3 style="font-size:15px;font-weight:800;margin-bottom:12px">${t('cmtTitle')} ${cm.length}</h3>

  </div>

</div>`}

function rGroupTab(){return`<div style="padding-bottom:80px">
  <div style="background:linear-gradient(135deg,#7c3aed,#ec4899);padding:20px;border-radius:0 0 28px 28px;color:#fff">

      ${g.description?`<p style="font-size:12px;color:var(--txt);margin-top:8px;line-height:1.5">${g.description}</p>`:''}
      <div style="display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap">${g.pace?`<span class="badge" style="background:#e0f2fe;color:#0369a1">${t('paceL')}: ${g.pace}</span>`:''} ${mb.map(m=>`<span style="background:#f3f4f6;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;color:var(--sub)">${m.nickname}</span>`).join('')}</div>

    </div>`}).join('')}</div>
</div>`}

function rTabBar(){return`<div class="tab-bar">${[{k:'home',i:_icon_home,l:t('tabHome')},{k:'rec',i:_icon_rec,l:t('tabRec')},{k:'run',i:_icon_run,l:t('tabRun')},{k:'group',i:_icon_group,l:t('tabGroup')},{k:'my',i:_icon_my,l:t('tabMy')}].map(tb=>`<button data-tab="${tb.k}" class="${S.tab===tb.k?'active':''}"><img src="${tb.i}" style="width:28px;height:28px;object-fit:contain;opacity:${S.tab===tb.k?'1':'.45'};filter:${S.tab===tb.k?'none':'grayscale(0)'};transition:opacity .2s">${tb.l}</button>`).join('')}</div>`}

// === 이벤트 ===
let recSelectedTags=[];
function bind(){
  // 탭
  document.querySelectorAll('[data-tab]').forEach(el=>el.onclick=()=>{S.tab=el.dataset.tab;S.modal=null;S.selectedCourse=null;S.showAllCmt=false;render()});
  // 언어
  const lt=$('langT');if(lt)lt.onclick=()=>{S.lang=S.lang==='ko'?'en':'ko';render()};
  // 필터
  document.querySelectorAll('[data-action="toggleSig"]').forEach(el=>el.onclick=()=>{S.filters.signal=S.filters.signal==='noSignal'?'all':'noSignal';render()});
  document.querySelectorAll('[data-filter]').forEach(el=>el.onclick=()=>{const[k,v]=el.dataset.filter.split(':');S.filters[k]=v;render()});
  document.querySelectorAll('[data-sort]').forEach(el=>el.onclick=()=>{S.sortBy=el.dataset.sort;render()});
  document.querySelectorAll('[data-recsort]').forEach(el=>el.onclick=()=>{S.recSort=el.dataset.recsort;render()});
  // 코스 열기
  document.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>{
    const[type,id]=el.dataset.open.split(':');
    S.selectedType=type;
    S.selectedCourse=type==='official'?S.courses.find(c=>c.id===id):S.recCourses.find(c=>c.id===id);
    S.modal='detail';S.showAllCmt=false;render();
  });
  // 뒤로/닫기
  document.querySelectorAll('[data-action="back"],[data-action="closeModal"]').forEach(el=>el.onclick=()=>{S.modal=null;S.selectedCourse=null;render()});
  // 좋아요
  document.querySelectorAll('[data-action="like"]').forEach(el=>el.onclick=()=>{
    if(!S.selectedCourse)return;const id=S.selectedCourse.id,k=id+':'+S.nickname;
    if(S.selectedType==='official'){if(S.likes[k])delete S.likes[k];else S.likes[k]=true;sl('likes',S.likes)}
    else{if(S.recLikes[k])delete S.recLikes[k];else S.recLikes[k]=true;sl('rlikes',S.recLikes)}
    render();
  });
  // 별점
  document.querySelectorAll('[data-rate]').forEach(el=>el.onclick=()=>{if(!S.selectedCourse)return;S.ratings[S.selectedCourse.id+':'+S.nickname]=+el.dataset.rate;sl('ratings',S.ratings);render()});
  // 댓글
  document.querySelectorAll('[data-action="comment"]').forEach(el=>el.onclick=()=>{
    const inp=$('cmtIn');if(!inp||!inp.value.trim()||!S.selectedCourse)return;
    const id=S.selectedCourse.id,cm={id:uid(),user:S.nickname,text:inp.value.trim(),ts:Date.now()};
    if(S.selectedType==='official'){if(!S.comments[id])S.comments[id]=[];S.comments[id].push(cm);sl('comments',S.comments)}
    else{if(!S.recComments[id])S.recComments[id]=[];S.recComments[id].push(cm);sl('rcomments',S.recComments)}
    render();
  });
  document.querySelectorAll('[data-action="showAll"]').forEach(el=>el.onclick=()=>{S.showAllCmt=true;render()});
  // 추천코스 등록
  document.querySelectorAll('[data-action="openWriteRec"]').forEach(el=>el.onclick=()=>{S.modal='writeRec';recSelectedTags=[];render()});
  document.querySelectorAll('[data-rectag]').forEach(el=>{
    const tg=el.dataset.rectag;
    if(recSelectedTags.includes(tg))el.classList.add('on');
    el.onclick=()=>{if(recSelectedTags.includes(tg))recSelectedTags=recSelectedTags.filter(x=>x!==tg);else recSelectedTags.push(tg);el.classList.toggle('on')};
  });
  document.querySelectorAll('[data-action="submitRec"]').forEach(el=>el.onclick=submitRecCourse);
  // GPS
  document.querySelectorAll('[data-action="startRun"]').forEach(el=>el.onclick=startGps);
  document.querySelectorAll('[data-action="pauseRun"]').forEach(el=>el.onclick=()=>{S.gpsState='paused';render()});
  document.querySelectorAll('[data-action="resumeRun"]').forEach(el=>el.onclick=()=>{S.gpsState='running';render()});
  document.querySelectorAll('[data-action="stopRun"]').forEach(el=>el.onclick=stopGps);
  // 그룹
  document.querySelectorAll('[data-action="openCG"]').forEach(el=>el.onclick=()=>{S.modal='createGroup';render()});
  document.querySelectorAll('[data-action="submitGr"]').forEach(el=>el.onclick=submitGroup);
  document.querySelectorAll('[data-ga]').forEach(el=>el.onclick=()=>{
    const[act,gid]=el.dataset.ga.split(':');const g=S.groupRuns.find(x=>x.id===gid);if(!g)return;if(!g.members)g.members=[];
    if(act==='join'){if(!g.members.find(m=>m.nickname===S.nickname))g.members.push({nickname:S.nickname})}
    else g.members=g.members.filter(m=>m.nickname!==S.nickname);
    sl('groups',S.groupRuns);render();
  });
}

function submitRecCourse(){
  const name=$('rf_name')?.value.trim(),desc=$('rf_desc')?.value.trim();
  const dist=parseFloat($('rf_dist')?.value)||0,elev=parseInt($('rf_elev')?.value)||0;
  const diff=$('rf_diff')?.value||'easy',surf=$('rf_surf')?.value.trim()||'';
  const emoji=$('rf_emoji')?.value||'📍',color=$('rf_color')?.value||'#059669';
  if(!name||!desc){alert(S.lang==='ko'?'이름과 설명을 입력하세요':'Enter name and description');return}
  if(!dist){alert(S.lang==='ko'?'거리를 입력하세요':'Enter distance');return}
  const c={
    id:'r_'+uid(),name:name,name_ko:name,name_en:name,
    area:S.lang==='ko'?'추천코스':'User Pick',area_ko:'추천코스',area_en:'User Pick',
    desc:desc,description_ko:desc,description_en:desc,
    distance:dist,elevation:elev,difficulty:diff,
    surface:surf,surface_ko:surf,surface_en:surf,
    tags:recSelectedTags.length?recSelectedTags:['scenic'],
    no_signal:recSelectedTags.includes('no_signal'),
    emoji,color,lat:S.recFormLat,lng:S.recFormLng,
    route_coords:[{lat:S.recFormLat,lng:S.recFormLng}],
    author:S.nickname,ts:Date.now()
  };
  S.recCourses.push(c);sl('recs',S.recCourses);
  S.modal=null;S.tab='rec';render();
}

function submitGroup(){
  const cid=$('grC')?.value,title=$('grT')?.value,date=$('grD')?.value;
  const max=+($('grM')?.value||10),pace=$('grP')?.value,desc=$('grDe')?.value;
  if(!cid||!date){alert(S.lang==='ko'?'코스와 날짜를 입력하세요':'Select course and date');return}
  const c=[...S.courses,...S.recCourses].find(x=>x.id===cid);
  S.groupRuns.push({id:uid(),course_id:cid,title:title||cn(c),description:desc,run_date:date,max_members:max,pace,host_nickname:S.nickname,members:[{nickname:S.nickname}]});
  sl('groups',S.groupRuns);S.modal=null;render();
}

// === GPS ===
function startGps(){
  const sel=$('runSel');if(!sel||!sel.value){alert(t('selCourse'));return}
  const[type,id]=sel.value.split(':');
  S.selectedCourse=type==='official'?S.courses.find(c=>c.id===id):S.recCourses.find(c=>c.id===id);
  S.selectedType=type;
  if(!navigator.geolocation){alert('GPS not supported');return}
  S.gpsState='waiting';S.gpsCoords=[];S.gpsDist=0;S.gpsElapsed=0;
  S.gpsWatch=navigator.geolocation.watchPosition(pos=>{
    const p={lat:pos.coords.latitude,lng:pos.coords.longitude,ts:Date.now()};
    if(S.gpsState==='waiting')S.gpsState='running';
    if(S.gpsState==='running'){if(S.gpsCoords.length>0)S.gpsDist+=calcDist(S.gpsCoords[S.gpsCoords.length-1],p);S.gpsCoords.push(p)}
    render();
  },e=>console.error('GPS:',e),{enableHighAccuracy:true,maximumAge:3000,timeout:10000});
  S.gpsTimer=setInterval(()=>{if(S.gpsState==='running'){S.gpsElapsed++;render()}},1000);
  render();
}
function stopGps(){
  if(S.gpsWatch)navigator.geolocation.clearWatch(S.gpsWatch);
  if(S.gpsTimer)clearInterval(S.gpsTimer);
  S.myRecords.unshift({course_id:S.selectedCourse?.id||'',distance:+(S.gpsDist/1000).toFixed(3),duration:S.gpsElapsed,avg_pace:fmtPace(S.gpsDist/1000,S.gpsElapsed),route:S.gpsCoords,ts:Date.now()});
  sl('records',S.myRecords);S.gpsState='idle';S.gpsWatch=null;S.gpsTimer=null;S.tab='my';render();
}

// === 카카오맵 ===
function hasKakao(){return typeof kakao!=='undefined'&&kakao.maps}
function mapPlaceholder(el,msg){if(el)el.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:12px;font-weight:600;text-align:center;padding:16px">🗺️ ${msg||'카카오맵 API 키 설정 후 지도가 표시됩니다'}</div>`}

function initDetailMap(){
  const el=$('detailMap');if(!el)return;
  const c=S.selectedCourse;if(!c)return;
  if(!hasKakao()){mapPlaceholder(el);return}
  const map=new kakao.maps.Map(el,{center:new kakao.maps.LatLng(c.lat,c.lng),level:5});
  new kakao.maps.Marker({map,position:new kakao.maps.LatLng(c.lat,c.lng)});
  if(c.route_coords&&c.route_coords.length>1){
    const path=c.route_coords.map(p=>new kakao.maps.LatLng(p.lat,p.lng));
    new kakao.maps.Polyline({map,path,strokeWeight:4,strokeColor:c.color||'#059669',strokeOpacity:.8,strokeStyle:'solid'});
  }
}

function initRecFormMap(){
  const el=$('recFormMap');if(!el)return;
  if(!hasKakao()){mapPlaceholder(el,S.lang==='ko'?'API 키 설정 후 지도에서 위치를 선택할 수 있습니다':'Set API key to pick location on map');return}
  const map=new kakao.maps.Map(el,{center:new kakao.maps.LatLng(S.recFormLat,S.recFormLng),level:7});
  let marker=new kakao.maps.Marker({map,position:new kakao.maps.LatLng(S.recFormLat,S.recFormLng),draggable:true});
  kakao.maps.event.addListener(map,'click',function(e){
    S.recFormLat=e.latLng.getLat();S.recFormLng=e.latLng.getLng();
    marker.setPosition(e.latLng);
    const ll=$('recLatLng');if(ll)ll.textContent='📍 '+S.recFormLat.toFixed(4)+', '+S.recFormLng.toFixed(4);
  });
  kakao.maps.event.addListener(marker,'dragend',function(){
    const p=marker.getPosition();S.recFormLat=p.getLat();S.recFormLng=p.getLng();
    const ll=$('recLatLng');if(ll)ll.textContent='📍 '+S.recFormLat.toFixed(4)+', '+S.recFormLng.toFixed(4);
  });
}

function initRecListMaps(){
  if(!hasKakao())return;
  S.recCourses.forEach(c=>{
    const el=$('minimap_rec_'+c.id);if(!el||el.dataset.init)return;
    el.dataset.init='1';
    const map=new kakao.maps.Map(el,{center:new kakao.maps.LatLng(c.lat,c.lng),level:6,draggable:false,zoomable:false});
    new kakao.maps.Marker({map,position:new kakao.maps.LatLng(c.lat,c.lng)});
    if(c.route_coords&&c.route_coords.length>1){
      const path=c.route_coords.map(p=>new kakao.maps.LatLng(p.lat,p.lng));
      new kakao.maps.Polyline({map,path,strokeWeight:3,strokeColor:c.color||'#059669',strokeOpacity:.7,strokeStyle:'solid'});
    }
  });
  // 공식 코스 미니맵도
  getFiltered().forEach(c=>{
    const el=$('minimap_official_'+c.id);if(!el||el.dataset.init)return;
    el.dataset.init='1';
    const map=new kakao.maps.Map(el,{center:new kakao.maps.LatLng(c.lat,c.lng),level:6,draggable:false,zoomable:false});
    new kakao.maps.Marker({map,position:new kakao.maps.LatLng(c.lat,c.lng)});
    if(c.route_coords&&c.route_coords.length>1){
      const path=c.route_coords.map(p=>new kakao.maps.LatLng(p.lat,p.lng));
      new kakao.maps.Polyline({map,path,strokeWeight:3,strokeColor:c.color||'#059669',strokeOpacity:.7,strokeStyle:'solid'});
    }
  });
}

// 홈 탭에서도 미니맵 초기화
const origBind=bind;
bind=function(){
  origBind.call?origBind():null;
  // 실제 bind는 위에서 정의됨
};
// 렌더 후 미니맵 초기화
const origRender=render;
render=function(){
  const a=$('app');
  if(!S.nickname){a.innerHTML=rLogin();bLogin();return}
  let h='';
  if(S.modal==='detail'&&S.selectedCourse)h=rDetail();
  else if(S.modal==='writeRec')h=rWriteRec();
  else if(S.modal==='createGroup')h=rCreateGroup();
  else if(S.tab==='rec')h=rRecTab();
  else if(S.tab==='run')h=rRunTab();
  else if(S.tab==='group')h=rGroupTab();
  else if(S.tab==='my')h=rMyTab();
  else h=rHome();
  h+=rTabBar();
  a.innerHTML=h;
  bind();
  if(S.modal==='detail')initDetailMap();
  if(S.modal==='writeRec')initRecFormMap();
  // 미니맵 지연 초기화
  setTimeout(()=>{
    if(S.tab==='home'&&!S.modal)initRecListMaps();
    if(S.tab==='rec'&&!S.modal)initRecListMaps();
  },100);
};

// === 초기화 ===
function init(){
  S.nickname=gl('nick','');S.courses=FC;
  S.likes=gl('likes',{});S.ratings=gl('ratings',{});S.comments=gl('comments',{});
  S.recCourses=gl('recs',[]);S.recLikes=gl('rlikes',{});S.recComments=gl('rcomments',{});
  S.groupRuns=gl('groups',[]);S.myRecords=gl('records',[]);
  render();
  api('getCourses').then(d=>{if(d&&Array.isArray(d)&&d.length){S.courses=d;render()}}).catch(()=>{});
}
init();
</script>
